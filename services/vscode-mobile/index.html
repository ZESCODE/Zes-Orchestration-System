<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
<title>ZES Code Editor</title>


<style>
:root{
  --color-primary:#6366f1;--color-secondary:#06b6d4;--color-success:#10b981;--color-danger:#ef4444;
  --glass-bg:#0f172abf;--glass-border:#6366f133;--glass-border-hover:#6366f166;
  --color-text:#f1f5f9;--color-text-secondary:#94a3b8;--color-text-muted:#64748b;
  --bg-base:#020617;--bg-card:#0f172acc;--bg-input:#1e293b99;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,sans-serif;
  --font-mono:"Fira Code","Droid Sans Mono","Cascadia Code",monospace;
  --text-xs:.7rem;--text-sm:.875rem;--text-base:1rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-full:9999px;
  --transition-fast:.15s ease;--z-sticky:200;--z-modal:300;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;height:100%}
body{font-family:var(--font-family);background:var(--bg-base);color:var(--color-text);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--glass-border-hover);border-radius:2px}

.header{position:sticky;top:0;z-index:var(--z-sticky);background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center;height:48px;padding:0 var(--space-3)}
.header-left{display:flex;align-items:center;gap:var(--space-2)}
.header-right{display:flex;align-items:center;gap:var(--space-2)}
.brand-link{display:flex;align-items:center;gap:8px;color:var(--color-text);text-decoration:none!important}
.brand-glow{background:linear-gradient(90deg,#6366f1,#06b6d4);border-radius:.4em;padding:2px;display:inline-block}
.brand-btn{color:#fff;width:26px;height:26px;font-size:.9em;font-weight:800;background:#000;border:none;border-radius:.3em;display:flex;justify-content:center;align-items:center}
.brand-name{font-weight:800;font-size:var(--text-sm);background:linear-gradient(135deg,var(--color-primary),var(--color-secondary));-webkit-text-fill-color:transparent;-webkit-background-clip:text;background-clip:text}

.menu-btn{cursor:pointer;color:var(--color-text);background:none;border:none;padding:6px;border-radius:var(--radius-md);font-size:18px}
@media(min-width:768px){.menu-btn{display:none}}

.drawer-overlay{position:fixed;inset:0;z-index:calc(var(--z-modal)+10);background:#020617d9;backdrop-filter:blur(6px);display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;bottom:0;left:-280px;width:280px;max-width:80vw;background:linear-gradient(180deg,var(--bg-base) 0%,#0a0f2a 100%);border-right:1px solid var(--glass-border);padding:var(--space-3);z-index:calc(var(--z-modal)+11);display:flex;flex-direction:column;transition:left .3s cubic-bezier(.16,1,.3,1);overflow-y:auto}
.drawer.open{left:0}
.drawer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3);padding-bottom:var(--space-3);border-bottom:1px solid var(--glass-border)}
.close-btn{color:var(--color-text-muted);font-size:var(--text-xl);background:none;border:none;padding:8px;cursor:pointer}
.drawer-group{margin-bottom:var(--space-2)}
.drawer-group-title{text-transform:uppercase;letter-spacing:1px;color:var(--color-text-muted);padding:var(--space-1) var(--space-3);font-size:9px;font-weight:700;opacity:.6}
.drawer-link{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--color-text-secondary);font-size:var(--text-sm);text-decoration:none!important;min-height:40px}
.drawer-link:hover{background:var(--color-primary-light);color:var(--color-text)}
.drawer-link.active{background:linear-gradient(135deg,var(--color-primary-light),#06b6d41a);color:var(--color-primary);border-left:2px solid var(--color-primary);padding-left:calc(var(--space-3)-2px)}

/* Iframe */
.iframe-container{height:calc(100vh - 48px);width:100%}
.iframe-container iframe{width:100%;height:100%;border:none;background:var(--bg-base)}

/* Toolbar */
.toolbar{background:var(--glass-bg);border-bottom:1px solid var(--glass-border);padding:var(--space-2) var(--space-3);display:flex;gap:var(--space-2);overflow-x:auto}
.tool-btn{padding:4px 12px;border-radius:var(--radius-md);font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--glass-border);background:transparent;color:var(--color-text-secondary);cursor:pointer;min-height:32px}
.tool-btn:hover{background:var(--color-primary-light);color:var(--color-text)}
.tool-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--radius-full);font-size:9px;font-weight:700;text-transform:uppercase;border:1px solid transparent}
.badge-success{color:var(--color-success);background:#10b98126;border-color:#10b9814d}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="toggleDrawer()">☰</button>
    <a href="/" class="brand-link">
      <span class="brand-glow"><span class="brand-btn">Z</span></span>
      <span class="brand-name">Code</span>
    </a>
  </div>
  <div class="header-right">
    <span class="badge badge-success" id="vscodeStatus">● Running</span>
  </div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="brand-link"><span class="brand-glow"><span class="brand-btn">Z</span></span><span class="brand-name">Code Editor</span></div>
    <button class="close-btn" onclick="toggleDrawer()">&times;</button>
  </div>
  <div class="drawer-group">
    <div class="drawer-group-title">Navigation</div>
    <a href="/" class="drawer-link active">💻 Code Editor</a>
    <a href="http://localhost:8083" class="drawer-link">📊 Dashboard</a>
    <a href="http://localhost:8084" class="drawer-link">💬 Agent Chat</a>
    <a href="http://localhost:8787" class="drawer-link">🤖 Hermes</a>
  </div>
  <div class="drawer-group">
    <div class="drawer-group-title">Tools</div>
    <a href="http://localhost:8001" class="drawer-link">🌐 Remote Agent</a>
    <a href="http://localhost:7173" class="drawer-link">🖥️ Terminal</a>
    <a href="http://localhost:19996" class="drawer-link">🌍 Topology</a>
  </div>
</div>

<div class="toolbar">
  <button class="tool-btn active" onclick="switchView(this, 'vscode')">VS Code</button>
  <button class="tool-btn" onclick="switchView(this, 'terminal')">Terminal</button>
  <button class="tool-btn" onclick="switchView(this, 'files')">Files</button>
</div>

<div class="iframe-container" id="iframeContainer">
  <iframe id="mainFrame" src="http://localhost:8000/?tkn=ZES_MOBILE" allow="clipboard-read;clipboard-write"></iframe>
</div>

<script>
function toggleDrawer() {
  document.getElementById("drawer").classList.toggle("open");
  document.getElementById("drawerOverlay").classList.toggle("open");
}

function switchView(el, view) {
  document.querySelectorAll(".tool-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  const frame = document.getElementById("mainFrame");
  const urls = {vscode: "http://localhost:8000/?tkn=ZES_MOBILE", terminal: "http://localhost:7173/", files: "http://localhost:8000/?tkn=ZES_MOBILE&view=explorer"};
  frame.src = urls[view] || urls.vscode;
}
</script>
</body>
</html>
